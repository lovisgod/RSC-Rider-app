name: rsc_rider
description: RSC Rider — delivery rider mobile application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0+1
  web_socket_channel: ^3.0.2

  # Dependency injection
  get_it: ^8.0.3

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6

  # Location & Maps
  geolocator: ^13.0.2
  google_maps_flutter: ^2.9.0

  # Background tasks
  workmanager: ^0.6.0

  # Deep links
  app_links: ^6.4.0

  # Environment config
  flutter_dotenv: ^5.2.1

  # Utilities
  intl: ^0.20.1
  logger: ^2.4.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - .env.development
    - .env.production
